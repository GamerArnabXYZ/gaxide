name: Flutter APK Build Cloud Workflow

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code From Repository
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter SDK Environment
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x' # Highly stable tree
        channel: 'stable'
        cache: true

    - name: Resolve Project Dependencies
      run: flutter pub get

    - name: Compile Premium Android APK
      run: flutter build apk --debug # Debug configuration builds super fast on cloud

    - name: Upload GAX IDE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gax-ide-release-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
