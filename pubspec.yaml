name: gax_ide
description: A high-performance premium Mobile IDE with GitHub integration.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  http: ^1.2.0

  # FIXED: Is constraint ko any ya ^1.1.0 karne se versioning loop error solve ho jayegi
  code_text_field: any 

  # File handling ka crash rokne ke liye shared_preferences (just in case requested)
  shared_preferences: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
