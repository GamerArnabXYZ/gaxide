name: gax_ide
description: GAX IDE v2.0 — Ultra-premium mobile-first code editor with GitHub push.
version: 2.0.0
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.2

  # Syntax highlighting editor + language definitions + color themes
  code_text_field: ^1.1.0
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0

  # Autosave GitHub token, storage tab paths, and file manager prefs
  shared_preferences: ^2.3.2

  # Raw filesystem access for the built-in File Manager
  permission_handler: ^11.3.1
  path_provider: ^2.0.15

  # Zip/unzip (ZArchiver-style archive support)
  archive: ^3.6.1

  # Hand off non-code files (PDF, video, docs, APK) to the system's own app
  open_filex: ^4.7.0

  # Lets other apps' "Open with" / "Share" menus offer GAX IDE
  receive_sharing_intent: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/samples/
