name: gax_ide
description: GAX IDE v2.0 — Ultra-premium mobile-first code editor with GitHub push.
version: 2.0.0
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.2

  # Syntax highlighting editor + language definitions + color themes
  code_text_field: ^1.1.0
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0

  # Autosave config (PAT / repo / branch / path)
  shared_preferences: ^2.3.2

  # Local file open/save workflow
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
